<!DOCTYPE html>

<html class="light" lang="pt-BR">

    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Cadastro de Aluno - XVI FETECMS</title>
        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com" rel="preconnect" />
        <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />

        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet" />
        <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
        <link href="../css/cadastro-fetecms.css" rel="stylesheet" />
        <!-- Tailwind CSS -->
        <script
            src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <!-- Tailwind Config -->
        <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e1e3e4",
                        "primary-fixed": "#eddcff",
                        "primary-container": "#43157a",
                        "on-secondary-fixed": "#002205",
                        "surface-container-low": "#f3f4f5",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#cdc3d3",
                        "on-primary-fixed-variant": "#592f91",
                        "primary": "#2a0058",
                        "tertiary": "#27005c",
                        "tertiary-container": "#400091",
                        "surface-bright": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "secondary": "#006e1f",
                        "surface-container": "#edeeef",
                        "on-secondary-container": "#007522",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#250059",
                        "inverse-on-surface": "#f0f1f2",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#581bb5",
                        "on-primary-fixed": "#290055",
                        "inverse-surface": "#2e3132",
                        "on-background": "#191c1d",
                        "surface-tint": "#7249aa",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#eaddff",
                        "inverse-primary": "#d8baff",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#76dd78",
                        "background": "#f8f9fa",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",

                        "on-secondary-fixed-variant": "#005315",

                        "surface-container-high": "#e7e8e9",
                        "surface": "#f8f9fa",
                        "outline": "#7c7482",
                        "surface-container-highest": "#e1e3e4",

                    "borderRadius": {

                    "spacing": {

                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-sm": ["Space Grotesk"],
                        "body-md": ["Inter"],

                }
            }
        }
    </script>
        <style type="text/tailwindcss">
        @layer utilities {
            .form-input-styled {
                @apply w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-2 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all;
            }
            .form-label-styled {
                @apply block font-label-md text-label-md text-on-surface mb-xs;
            }
        }
    </style>
        <link href="../css/cadastro-fetecms.css" rel="stylesheet" />
    </head>

    <body
        class="fetec-auth-shell bg-background text-on-background min-h-screen antialiased"
        data-fetec-auth data-fetec-auth-active="projetos">
        <div id="fetec-auth-shell"></div>
        <!-- Main Canvas -->
        <main
            class="fetec-main-offset flex-1 w-full min-h-screen relative overflow-hidden pb-8">
            <!-- Decorative Background Gradient -->
            <div
                class="absolute top-0 right-0 w-[600px] h-[600px] bg-primary-fixed-dim/20 rounded-full blur-[100px] -z-10 translate-x-1/3 -translate-y-1/3 pointer-events-none">
            </div>
            <div class="fetec-auth-content py-md md:py-5">
                <!-- Page Header -->
                <div
                    class="flex flex-col md:flex-row md:items-end justify-between gap-md mb-lg">
                    <div>
                        <div
                            class="flex items-center gap-sm text-on-surface-variant mb-xs">
                            <span
                                class="material-symbols-outlined text-sm">arrow_back</span>
                            <a
                                class="font-label-md text-label-md hover:text-primary transition-colors"
                                href="projetos.html">Voltar para
                                meus projetos</a>
                        </div>
                        <h2
                            class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-xs">
                            Cadastro de Aluno</h2>
                        <p
                            class="font-body-md text-body-md text-on-surface-variant">Preencha
                            os dados do estudante para
                            vinculá-lo a este projeto.</p>
                    </div>
                    <!-- Student Counter Pill -->
                    <div
                        class="flex items-center gap-sm bg-surface-container-high px-sm py-2 rounded-full border border-outline-variant/50 shadow-sm">
                        <span
                            class="material-symbols-outlined text-primary-container">groups</span>
                        <span
                            class="font-label-md text-label-md text-on-surface">
                            <strong class="text-primary-container">2</strong> de
                            3 cadastrados
                        </span>
                        <div
                            class="w-16 h-2 bg-surface-variant rounded-full ml-xs overflow-hidden">
                            <div
                                class="h-full bg-primary-container w-[66%] rounded-full"></div>
                        </div>
                    </div>
                </div>
                <!-- Form Card -->
                <form
                    class="bg-surface rounded-xl shadow-[0_4px_24px_rgba(67,21,122,0.12)] border border-outline-variant/20 overflow-hidden">
                    <!-- Section 1: Dados Pessoais -->
                    <div
                        class="p-md md:p-lg border-b border-outline-variant/30 relative">
                        <div class="flex items-center gap-sm mb-md">
                            <div
                                class="w-8 h-8 rounded-full bg-tertiary-fixed text-on-tertiary-fixed flex items-center justify-center">
                                <span
                                    class="material-symbols-outlined text-sm">person</span>
                            </div>
                            <h3
                                class="font-headline-sm text-headline-sm text-primary">Dados
                                Pessoais</h3>
                        </div>
                        <div
                            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-md">
                            <div class="lg:col-span-2">
                                <label class="form-label-styled" for="nome">Nome
                                    Completo</label>
                                <input class="form-input-styled" id="nome"
                                    placeholder="Ex: Maria da Silva Souza"
                                    type="text" />
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="cpf">CPF</label>
                                <input class="form-input-styled" id="cpf"
                                    placeholder="000.000.000-00" type="text" />
                            </div>
                            <div class="lg:col-span-2">
                                <label class="form-label-styled"
                                    for="email">E-mail</label>
                                <input class="form-input-styled" id="email"
                                    placeholder="aluno@escola.com.br"
                                    type="email" />
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="telefone">Telefone / WhatsApp</label>
                                <input class="form-input-styled" id="telefone"
                                    placeholder="(00) 00000-0000" type="tel" />
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="nascimento">Data de Nascimento</label>
                                <input
                                    class="form-input-styled text-on-surface-variant"
                                    id="nascimento" type="date" />
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="genero">Gênero</label>
                                <select
                                    class="form-input-styled text-on-surface-variant appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%237c7482%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.2em_1.2em] bg-[right_0.75rem_center] bg-no-repeat pr-10"
                                    id="genero">
                                    <option value>Selecione...</option>
                                    <option value="feminino">Feminino</option>
                                    <option value="masculino">Masculino</option>
                                    <option value="nao-binario">Não
                                        Binário</option>
                                    <option value="prefiro-nao-dizer">Prefiro
                                        não dizer</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="etnia">Raça/Cor (IBGE)</label>
                                <select
                                    class="form-input-styled text-on-surface-variant appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%237c7482%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.2em_1.2em] bg-[right_0.75rem_center] bg-no-repeat pr-10"
                                    id="etnia">
                                    <option value>Selecione...</option>
                                    <option value="branca">Branca</option>
                                    <option value="preta">Preta</option>
                                    <option value="parda">Parda</option>
                                    <option value="amarela">Amarela</option>
                                    <option value="indigena">Indígena</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="camiseta">Tamanho da Camiseta</label>
                                <select
                                    class="form-input-styled text-on-surface-variant appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%237c7482%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.2em_1.2em] bg-[right_0.75rem_center] bg-no-repeat pr-10"
                                    id="camiseta">
                                    <option value>Selecione...</option>
                                    <option value="pp">PP</option>
                                    <option value="p">P</option>
                                    <option value="m">M</option>
                                    <option value="g">G</option>
                                    <option value="gg">GG</option>
                                    <option value="xgg">XGG</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <!-- Section 2: Dados Acadêmicos -->
                    <div class="p-md md:p-lg bg-surface-bright/50">
                        <div class="flex items-center gap-sm mb-md">
                            <div
                                class="w-8 h-8 rounded-full bg-secondary-fixed text-on-secondary-fixed flex items-center justify-center">
                                <span
                                    class="material-symbols-outlined text-sm">school</span>
                            </div>
                            <h3
                                class="font-headline-sm text-headline-sm text-primary">Dados
                                Acadêmicos</h3>
                        </div>
                        <div
                            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-md">
                            <div class="lg:col-span-3">
                                <label class="form-label-styled"
                                    for="instituicao">Instituição de
                                    Ensino</label>
                                <select class="form-input-styled"
                                    id="instituicao" required>
                                    <option value>Selecione a
                                        instituição...</option>
                                    <option value="ufms">UFMS</option>
                                    <option value="uems">UEMS</option>
                                    <option value="ifms">IFMS</option>
                                    <option value="ucdb">UCDB</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="modalidade">Modalidade de
                                    Ensino</label>
                                <select
                                    class="form-input-styled text-on-surface-variant appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%237c7482%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.2em_1.2em] bg-[right_0.75rem_center] bg-no-repeat pr-10"
                                    id="modalidade">
                                    <option value>Selecione...</option>
                                    <option value="fundamental">Ensino
                                        Fundamental II</option>
                                    <option value="medio">Ensino Médio
                                        Regular</option>
                                    <option value="tecnico">Ensino Técnico
                                        Integrado</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="ano_escolar">Ano/Série</label>
                                <select
                                    class="form-input-styled text-on-surface-variant appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%237c7482%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.2em_1.2em] bg-[right_0.75rem_center] bg-no-repeat pr-10"
                                    id="ano_escolar">
                                    <option value>Selecione...</option>
                                    <option value="1">1º Ano</option>
                                    <option value="2">2º Ano</option>
                                    <option value="3">3º Ano</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label-styled"
                                    for="periodo">Período de Estudo</label>
                                <select
                                    class="form-input-styled text-on-surface-variant appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%237c7482%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.2em_1.2em] bg-[right_0.75rem_center] bg-no-repeat pr-10"
                                    id="periodo">
                                    <option value>Selecione...</option>
                                    <option value="matutino">Matutino</option>
                                    <option
                                        value="vespertino">Vespertino</option>
                                    <option value="noturno">Noturno</option>
                                    <option value="integral">Integral</option>
                                </select>
                            </div>
                            <div class="lg:col-span-2">
                                <label class="form-label-styled"
                                    for="graduacao">Graduação Pretendida
                                    (Futuro)</label>
                                <input class="form-input-styled" id="graduacao"
                                    placeholder="Ex: Engenharia de Software, Biologia..."
                                    type="text" />
                            </div>
                            <div
                                class="col-span-1 md:col-span-2 lg:col-span-3 flex flex-col md:flex-row gap-md mt-sm">
                                <label
                                    class="flex items-start gap-sm cursor-pointer group">
                                    <input
                                        class="mt-1 rounded text-primary-container focus:ring-primary-container/20 border-outline-variant w-5 h-5 transition-all"
                                        type="checkbox" />
                                    <div>
                                        <span
                                            class="font-label-md text-label-md text-on-surface block group-hover:text-primary transition-colors">Bolsista
                                            CNPq/Fundect</span>
                                        <span
                                            class="font-body-sm text-body-sm text-on-surface-variant">O
                                            aluno já recebe
                                            algum fomento científico.</span>
                                    </div>
                                </label>
                                <label
                                    class="flex items-start gap-sm cursor-pointer group md:ml-md">
                                    <input
                                        class="mt-1 rounded text-primary-container focus:ring-primary-container/20 border-outline-variant w-5 h-5 transition-all"
                                        type="checkbox" />
                                    <div>
                                        <span
                                            class="font-label-md text-label-md text-on-surface block group-hover:text-primary transition-colors">Membro
                                            de Clube de Ciências</span>
                                        <span
                                            class="font-body-sm text-body-sm text-on-surface-variant">Participa
                                            ativamente
                                            de clubes extracurriculares.</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                    <!-- Footer Actions -->
                    <div
                        class="p-md md:p-lg bg-surface border-t border-outline-variant/30 flex flex-col md:flex-row justify-end items-center gap-sm md:gap-md">
                        <a class="fetec-btn fetec-btn-outline w-full md:w-auto"
                            href="cadastro4.html">
                            CANCELAR
                        </a>
                        <!-- Using 'secondary' from theme for Success action as requested to use theme colors -->
                        <button
                            class="w-full md:w-auto px-6 py-3 rounded-lg bg-secondary text-on-secondary font-label-md text-label-md hover:bg-on-secondary-container transition-colors shadow-sm focus:ring-2 focus:ring-secondary/50 outline-none flex items-center justify-center gap-2"
                            type="submit">
                            <span
                                class="material-symbols-outlined text-[20px]">person_add</span>
                            CADASTRAR ALUNO
                        </button>
                    </div>
                </form>
            </div>
        </main>
        <script src="../js/cadastro-masks.js"></script>
        <script src="../js/fetec-layout.js"></script>
    </body>

</html>
