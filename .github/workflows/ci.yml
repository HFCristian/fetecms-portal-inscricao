name: CI

# Roda automaticamente a cada push/merge na main e em PRs que miram a main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo ref quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend — Pint + PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Instalar dependências Composer
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências NPM
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Preparar ambiente
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Testes
        run: php artisan test

  frontend:
    name: Frontend — Vitest + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências (npm ci)
        run: npm ci

      - name: Testes de componente (Vitest)
        run: npm test

      - name: Build de produção (Vite)
        run: npm run build
