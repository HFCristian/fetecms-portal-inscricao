name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend — Pint + PHPUnit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Instalar dependências Composer
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências NPM
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Preparar ambiente
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Testes
        run: php artisan test

    frontend:
      name: Frontend — Vitest + build
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Setup Node 22
          uses: actions/setup-node@v4
          with:
            node-version: '22'
            cache: npm

        - name: Instalar dependências (npm ci)
          run: npm ci

        - name: Testes de componente (Vitest)
          run: npm test

        - name: Build de produção (Vite)
          run: npm run build

    security:
      name: Security Audit
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Setup PHP 8.4
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.4'

        - name: Instalar dependências Composer
          run: composer install --no-interaction --prefer-dist --no-progress

        - name: Auditoria Composer
          run: composer audit

        - name: Setup Node 22
          uses: actions/setup-node@v4
          with:
            node-version: '22'
            cache: npm

        - name: Instalar dependências NPM
          run: npm ci

        - name: Auditoria NPM
          run: npm audit --audit-level=high

        - name: Scan de segredos (Gitleaks)
          uses: gitleaks/gitleaks-action@v2
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}