<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cadastro do Orientador - Etapa 2</title>
    <!-- Google Fonts: Space Grotesk (Headlines) & Inter (Body/Labels) -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Space+Grotesk&family=Orbitron:wght@600;700:wght@600;700&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Configuration -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "outline": "#7c7482",
                        "primary": "#2a0058",
                        "on-secondary-container": "#007522",
                        "on-primary-fixed": "#290055",
                        "secondary-fixed": "#92fa91",
                        "primary-fixed-dim": "#d8baff",
                        "primary-container": "#43157a",
                        "on-tertiary-fixed-variant": "#581bb5",
                        "secondary-fixed-dim": "#76dd78",
                        "on-tertiary-container": "#ac82ff",
                        "on-surface-variant": "#4a4451",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#250059",
                        "error-container": "#ffdad6",
                        "on-surface": "#191c1d",
                        "surface": "#f8f9fa",
                        "inverse-surface": "#2e3132",
                        "background": "#f8f9fa",
                        "secondary-container": "#92fa91",
                        "surface-bright": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "outline-variant": "#cdc3d3",
                        "inverse-primary": "#d8baff",
                        "secondary": "#006e1f",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-tint": "#7249aa",
                        "on-background": "#191c1d",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f4f5",
                        "on-primary-fixed-variant": "#592f91",
                        "surface-variant": "#e1e3e4",
                        "on-secondary-fixed": "#002205",
                        "surface-dim": "#d9dadb",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-container": "#400091",
                        "tertiary-fixed": "#eaddff",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#005315",
                        "tertiary": "#27005c",
                        "tertiary-fixed-dim": "#d3bbff",
                        "on-primary-container": "#b085eb",
                        "primary-fixed": "#eddcff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "64px",
                        "xs": "4px",
                        "sm": "12px",
                        "gutter": "24px",
                        "md": "24px",
                        "lg": "40px",
                        "container-max": "1200px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-lg-mobile": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "label-sm": ["Inter"],
                        "headline-xl": ["Space Grotesk"],
                        "headline-sm": ["Space Grotesk"],

                    },
                    "fontSize": {

                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "600" }],

                        "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Focus Ring for Inputs */
        .input-focus-ring:focus {
            box-shadow: 0 0 0 2px rgba(67, 21, 122, 0.2);
            border-color: #43157A;
            outline: none;
        }

        /* Custom Ambient Shadow for Card */
        .science-shadow {
            box-shadow: 0 4px 24px rgba(67, 21, 122, 0.12);
        }

        /* Geometric Pattern Overlay */
        .bg-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
    <link href="../css/cadastro-fetecms.css" rel="stylesheet" />
</head>

<body class="fetec-gradient-bg min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-10 antialiased" data-fetec-wizard="2">
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-[10%] right-[10%] w-[40vw] h-[40vw] bg-secondary-container rounded-full mix-blend-overlay filter blur-[120px] opacity-20"></div>
        <div class="absolute bottom-[10%] left-[5%] w-[50vw] h-[50vw] bg-tertiary-container rounded-full mix-blend-overlay filter blur-[150px] opacity-30"></div>
    </div>
    <main class="fetec-wizard-card w-full max-w-container-max bg-surface-container-lowest rounded-xl fetec-card-shadow overflow-hidden flex flex-col lg:flex-row relative z-10">
        <aside id="fetec-wizard-aside"></aside>
        <section class="w-full lg:w-7/12 flex flex-col bg-surface-container-lowest min-h-0">
            <div id="fetec-wizard-mobile-header"></div>
            <div id="fetec-wizard-progress" class="px-gutter lg:px-lg pt-gutter lg:pt-lg pb-md w-full border-b border-outline-variant/20"></div>
            <div class="fetec-wizard-form-area flex-grow p-gutter lg:p-lg overflow-y-auto custom-scrollbar">
                <div class="mb-md">
                    <h2 class="font-headline-md text-headline-md text-on-surface font-orbitron-override">Informações Acadêmicas</h2>
                    <p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Informe sua formação e vínculo com a instituição de ensino.</p>
                </div>
                <form class="flex flex-col gap-md"><!-- Institution Group -->
                <div class="flex flex-col gap-xs w-full">
                    <label class="font-label-md text-label-md text-on-surface">Instituição de Ensino *</label>
                    <div class="flex flex-col sm:flex-row gap-sm items-stretch sm:items-center">
                        <div class="relative flex-1">
                            <select
                                class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-sm py-sm pr-10 font-body-md text-body-md text-on-surface input-focus-ring cursor-pointer transition-colors"
                                required="">
                                <option disabled="" selected="" value="">Selecione a instituição onde atua...</option>
                                <option value="ufms">Universidade Federal de Mato Grosso do Sul (UFMS)</option>
                                <option value="uems">Universidade Estadual de Mato Grosso do Sul (UEMS)</option>
                                <option value="ifms">Instituto Federal de Mato Grosso do Sul (IFMS)</option>
                                <option value="ucdb">Universidade Católica Dom Bosco (UCDB)</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                        </div>
                        <button
                            class="shrink-0 flex items-center justify-center gap-xs border-2 border-primary-container text-primary-container px-md py-sm rounded-lg font-label-md text-label-md hover:bg-primary-container/5 transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-[18px]">add</span>
                            Nova instituição
                        </button>
                    </div>
                </div>
                <!-- Type & Link Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-label-md text-on-surface">Tipo de Instituição *</label>
                        <div class="relative">
                            <select
                                class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-sm py-sm pr-10 font-body-md text-body-md text-on-surface input-focus-ring cursor-pointer transition-colors"
                                required="">
                                <option disabled="" selected="" value="">Ex: Pública Federal</option>
                                <option value="publica_federal">Pública Federal</option>
                                <option value="publica_estadual">Pública Estadual</option>
                                <option value="publica_municipal">Pública Municipal</option>
                                <option value="privada">Privada</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-label-md text-on-surface">Vínculo Institucional *</label>
                        <div class="relative">
                            <select
                                class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-sm py-sm pr-10 font-body-md text-body-md text-on-surface input-focus-ring cursor-pointer transition-colors"
                                required="">
                                <option disabled="" selected="" value="">Ex: Professor Efetivo</option>
                                <option value="efetivo">Professor Efetivo</option>
                                <option value="substituto">Professor Substituto</option>
                                <option value="tecnico">Técnico Administrativo</option>
                                <option value="pesquisador">Pesquisador</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                        </div>
                    </div>
                </div>
                <!-- Proof of Link -->
                <div class="flex flex-col gap-xs w-full">
                    <label class="font-label-md text-label-md text-on-surface">Atestado de Vínculo Institucional
                        *</label>
                    <div class="relative">
                        <select
                            class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-sm py-sm pr-10 font-body-md text-body-md text-on-surface input-focus-ring cursor-pointer transition-colors"
                            required="">
                            <option disabled="" selected="" value="">Selecione o tipo de documento comprobatório...
                            </option>
                            <option value="holerite">Contracheque / Holerite (últimos 3 meses)</option>
                            <option value="declaracao">Declaração da Chefia Imediata</option>
                            <option value="contrato">Cópia do Contrato de Trabalho</option>
                            <option value="portaria">Portaria de Nomeação</option>
                        </select>
                        <span
                            class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                    </div>
                    <p class="font-body-sm text-body-sm text-outline mt-1 flex items-center gap-xs">
                        <span class="material-symbols-outlined text-[16px]">info</span>
                        O upload do arquivo será solicitado na revisão final do cadastro.
                    </p>
                </div>
                <!-- Degree & Course Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-label-md text-on-surface">Formação / Titulação *</label>
                        <div class="relative">
                            <select
                                class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-sm py-sm pr-10 font-body-md text-body-md text-on-surface input-focus-ring cursor-pointer transition-colors"
                                required="">
                                <option disabled="" selected="" value="">Ex: Doutorado</option>
                                <option value="graduacao">Graduação Completa</option>
                                <option value="especializacao">Especialização</option>
                                <option value="mestrado">Mestrado</option>
                                <option value="doutorado">Doutorado</option>
                                <option value="pos_doutorado">Pós-Doutorado</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-label-md text-on-surface">Curso de Formação *</label>
                        <div class="relative">
                            <select
                                class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-sm py-sm pr-10 font-body-md text-body-md text-on-surface input-focus-ring cursor-pointer transition-colors"
                                required="">
                                <option disabled="" selected="" value="">Selecione o curso...</option>
                                <option value="biologia">Ciências Biológicas</option>
                                <option value="quimica">Química</option>
                                <option value="fisica">Física</option>
                                <option value="matematica">Matemática</option>
                                <option value="pedagogia">Pedagogia</option>
                                <option value="outro">Outro</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                        </div>
                    </div>
                </div>
                <!-- Knowledge Area Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-label-md text-on-surface">Área do Conhecimento (CNPq) *</label>
                        <div class="relative">
                            <select
                                class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-sm py-sm pr-10 font-body-md text-body-md text-on-surface input-focus-ring cursor-pointer transition-colors"
                                required="">
                                <option disabled="" selected="" value="">Selecione a grande área...</option>
                                <option value="exatas">Ciências Exatas e da Terra</option>
                                <option value="biologicas">Ciências Biológicas</option>
                                <option value="engenharias">Engenharias</option>
                                <option value="saude">Ciências da Saúde</option>
                                <option value="agrarias">Ciências Agrárias</option>
                                <option value="sociais">Ciências Sociais Aplicadas</option>
                                <option value="humanas">Ciências Humanas</option>
                                <option value="letras">Linguística, Letras e Artes</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-label-md text-on-surface">Sub-área de Atuação *</label>
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-md text-body-md text-on-surface placeholder:text-outline input-focus-ring transition-colors"
                            placeholder="Ex: Genética Molecular" required="" type="text" />
                    </div>
                </div>
                <!-- Advising Time -->
                <div class="flex flex-col gap-xs w-full">
                    <label class="font-label-md text-label-md text-on-surface">Tempo de Experiência com Orientação
                        *</label>
                    <div class="relative">
                        <select
                            class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-sm py-sm pr-10 font-body-md text-body-md text-on-surface input-focus-ring cursor-pointer transition-colors"
                            required="">
                            <option disabled="" selected="" value="">Selecione o tempo aproximado...</option>
                            <option value="iniciante">Menos de 1 ano (Primeira vez orientando)</option>
                            <option value="1a3">De 1 a 3 anos</option>
                            <option value="3a5">De 3 a 5 anos</option>
                            <option value="5a10">De 5 a 10 anos</option>
                            <option value="mais10">Mais de 10 anos</option>
                        </select>
                        <span
                            class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
                    </div>
                </div>
                </form>
            </div>
            <div class="p-gutter lg:p-lg border-t border-outline-variant/20 bg-surface-bright flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-3 mt-auto">
                <a class="fetec-btn fetec-btn-outline w-full sm:w-auto justify-center" href="cadastro1.html">
                    <span class="material-symbols-outlined text-[20px]">arrow_back</span> VOLTAR
                </a>
                
                <a class="fetec-btn fetec-btn-primary w-full sm:w-auto justify-center" href="cadastro3.html">
                    PRÓXIMO
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                </a>
            </div>
        </section>
    </main>
    <script src="../js/cadastro-masks.js"></script>
    <script src="../js/fetec-layout.js"></script>
</body>

</html>
